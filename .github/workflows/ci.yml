name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Phase 1: Fast checks (single platform, ~2 min) ──
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run test:unit
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo check --manifest-path src-tauri/Cargo.toml

  # ── Phase 2: Cross-platform E2E (mock IPC, parallel ~3 min) ──
  e2e:
    needs: check
    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install chromium
      - name: Run E2E tests
        run: npm run test:e2e
