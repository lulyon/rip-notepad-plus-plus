name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    strategy:
      matrix:
        include:
          - { os: macos-latest,   target: aarch64-apple-darwin,      artifact: macos-arm64 }
          - { os: macos-latest,   target: x86_64-apple-darwin,       artifact: macos-x64 }
          - { os: windows-latest, target: x86_64-pc-windows-msvc,    artifact: windows-x64 }
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu,  artifact: linux-x64 }
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: "${{ matrix.target }}"

      - name: Install Tauri Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev \
            libjavascriptcoregtk-4.1-dev libsoup-3.0-dev

      - name: Build
        run: npm run tauri build -- --target ${{ matrix.target }}

      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
          if-no-files-found: ignore

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - run: ls -R artifacts/
      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          append_body: |
            ---
            **Linux users**: Ubuntu 24.04+ may need to install `libfuse2` to run the AppImage:
            ```
            sudo apt install libfuse2
            ```
          files: artifacts/**/*
